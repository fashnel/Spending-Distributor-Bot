services:
  bot:
    image: ghcr.io/fashnel/spending-distributor-bot:latest
    container_name: telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HTTPS_PROXY=${PROXY_URL}
      - HTTP_PROXY=${PROXY_URL}
      - https_proxy=${PROXY_URL}
      - http_proxy=${PROXY_URL}
    volumes:
      - ./client_secret.json:/app/client_secret.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

